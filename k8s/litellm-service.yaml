# LiteLLM Services
# Internal ClusterIP service for cluster communication
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: litellm
  labels:
    app: litellm
spec:
  type: ClusterIP
  ports:
  - port: 4000
    targetPort: 4000
    protocol: TCP
    name: http
  selector:
    app: litellm
---
# External LoadBalancer service for public access
apiVersion: v1
kind: Service
metadata:
  name: litellm-external
  namespace: litellm
  labels:
    app: litellm
  annotations:
    cloud.google.com/load-balancer-type: "External"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 4000
    protocol: TCP
    name: http
  selector:
    app: litellm
  sessionAffinity: ClientIP
