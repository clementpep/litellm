# Cloud Build configuration to build and push LiteLLM Docker image
steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/litellm-repo/litellm:$BUILD_ID'
      - '-t'
      - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/litellm-repo/litellm:latest'
      - '.'

# Store images in Artifact Registry
images:
  - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/litellm-repo/litellm:$BUILD_ID'
  - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/litellm-repo/litellm:latest'

# Use faster machine type for builds
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
