# LiteLLM Production Configuration
# Documentation: https://docs.litellm.ai/docs/proxy/prod

# Wildcard pass-through for all Gemini models via Vertex AI (uses GKE ADC, no API key required)
model_list:
  - model_name: "gemini/*"
    litellm_params:
      model: "vertex_ai/gemini/*"
      vertex_project: "wavestone-ai-librechat"
      vertex_location: "us-central1"

litellm_settings:
  # Production logging - disable verbose, use JSON logs
  set_verbose: False
  json_logs: true

  # Database batch write optimization for better performance
  proxy_batch_write_at: 60

  # Drop unsupported params (e.g. encoding_format for Gemini embeddings)
  drop_params: true

general_settings:
  # Master key for admin access (required, must start with sk-)
  master_key: ${LITELLM_MASTER_KEY}

  # Database URL will be provided via DATABASE_URL environment variable
  # database_url is read from DATABASE_URL env var automatically

  # Enable UI for admin panel
  ui: true

  # Store model in DB
  store_model_in_db: true

# Environment will be set to PRODUCTION via env var
environment_variables:
  LITELLM_MODE: "PRODUCTION"
  LITELLM_LOG: "INFO"
